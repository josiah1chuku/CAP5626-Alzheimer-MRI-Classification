name: Alzheimer MRI Classification Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # allows manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install torch torchvision torchaudio \
          --index-url https://download.pytorch.org/whl/cpu
        pip install timm numpy pandas matplotlib \
          seaborn scikit-learn tqdm jupyter nbconvert

    - name: Verify installation
      run: |
        python -c "import torch; print('PyTorch:', torch.__version__)"
        python -c "import timm; print('timm:', timm.__version__)"
        python -c "import sklearn; print('sklearn:', sklearn.__version__)"

    - name: Convert notebook to script
      run: |
        jupyter nbconvert --to script alzheimer_classification.ipynb \
          --output alzheimer_script

    - name: Run pipeline (smoke test)
      run: |
        python - << 'EOF'
        import torch
        import timm
        import numpy as np
        from sklearn.metrics import roc_auc_score
        print("All imports successful")
        print("GPU available:", torch.cuda.is_available())

        # Verify model builds correctly
        model = timm.create_model('densenet121',
                                   pretrained=False,
                                   num_classes=5)
        x = torch.randn(2, 3, 224, 224)
        out = model(x)
        assert out.shape == (2, 5), f"Wrong shape: {out.shape}"
        print("DenseNet121 forward pass: OK", out.shape)

        model2 = timm.create_model('efficientnet_b0',
                                    pretrained=False,
                                    num_classes=5)
        out2 = model2(x)
        assert out2.shape == (2, 5)
        print("EfficientNet-B0 forward pass: OK", out2.shape)

        print("Pipeline smoke test PASSED")
        EOF

    - name: Upload notebook as artifact
      uses: actions/upload-artifact@v7
      with:
        name: alzheimer-notebook
        path: alzheimer_classification.ipynb
        retention-days: 30

    - name: Upload requirements as artifact
      uses: actions/upload-artifact@v7
      with:
        name: requirements
        path: requirements.txt
        retention-days: 30
